# Go2 四足机器人配置
robot:
  name: "go2"
  type: "quadruped"

  # 身体尺寸
  body:
    mass: 5.0          # kg
    length: 0.5        # m
    width: 0.2         # m
    height: 0.12       # m

  # 腿部参数
  legs:
    num_legs: 4
    hip_length: 0.085  # m
    thigh_length: 0.2  # m
    calf_length: 0.2   # m
    foot_radius: 0.02  # m

  # 关节限制 (弧度)
  joints:
    hip_x:
      lower: -0.5
      upper: 0.5
    hip_y:
      lower: -1.0
      upper: 1.0
    knee:
      lower: -2.5
      upper: -0.5

  # 电机参数
  motors:
    kp: 60.0           # 位置增益
    kd: 2.0            # 速度阻尼
    max_torque: 35.0   # 最大力矩 (Nm)

  # PD 控制参数
  control:
    type: "position"   # position / torque
    frequency: 50      # Hz
    action_scale: 0.5  # 动作缩放因子

  # 传感器
  sensors:
    imu: true
    joint_encoders: true
    foot_contacts: true
    base_orientation: true
